name: Lumina CI Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  contracts-soroban:
    name: Soroban Smart Contracts (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Run unit tests
        run: cargo test
        working-directory: contracts/lumina_escrow

  contracts-evm:
    name: EVM Smart Contracts (Solidity/Hardhat)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: contracts-evm/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: contracts-evm

      - name: Compile Solidity contracts
        run: npm run compile
        working-directory: contracts-evm

      - name: Run unit tests
        run: npm run test
        working-directory: contracts-evm

  frontend:
    name: Frontend Application (Next.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: lumina-web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: lumina-web

      - name: Verify build compiles
        run: npm run build
        working-directory: lumina-web
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_LUMINA_CONTRACT_ID: CBLKDMO6M5GJZVNPKD2QRCAKGDFUHJCF27EG7MOFRAEHSNWMXAOOG6HA
          NEXT_PUBLIC_USDC_CONTRACT_ID: CBIELTK6YBZJU5UP2WWQEUCYKLPU6AUNZ2BQ4WWFEIE3USCIHMXQDAMA
          NEXT_PUBLIC_ADMIN_ADDRESS: GDWOBCG7XPQZOMO7FAOJB73RDDJX4TV3OHP5CIBRYPI3TXMWRYMJ6FHV
